<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="منصة GIS احترافية لعرض وتحليل التراث المادي واللامادي في محافظة قنا."
    />
    <meta
      name="keywords"
      content="قنا, تراث, GIS, Leaflet, خريطة, تراث مادي, تراث لامادي"
    />
    <meta name="author" content="Qena Web GIS" />
    <title>التراث المادي واللامادي في محافظة قنا</title>

    <link rel="icon" href="./assets/icons/favicon.png" type="image/png">

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>

      <header class="top-header" aria-label="رأس الصفحة">
        <h1>التراث المادي واللامادي في محافظة قنا</h1>
      </header>

      <div class="floating-search">
        <input
          id="searchInput"
          type="search"
          placeholder="ابحث بالاسم أو التصنيف..."
          aria-label="بحث المواقع"
        />
        <button id="searchBtn" class="search-btn" type="button" title="بحث">
          بحث
        </button>
        <div id="searchSuggestions" class="search-suggestions" aria-label="اقتراحات البحث"></div>
      </div>

      <aside id="sidebar" class="sidebar expanded" aria-label="لوحة الفلاتر">
        <button id="toggleSidebarBtn" class="sidebar-toggle" type="button" title="طي اللوحة">
          ❮
        </button>
        <div class="sidebar-content">
          <h2>المرشحات</h2>
          <section class="panel-section">
            <h3>الطبقات</h3>
            <div class="layer-toggles">
              <label class="filter-item"><input id="toggleTangible" type="checkbox" checked /> التراث المادي</label>
              <label class="filter-item"><input id="toggleIntangible" type="checkbox" checked /> التراث اللامادي</label>
              <label class="filter-item"><input id="toggleHeatmap" type="checkbox" /> الكثافة الحرارية</label>
            </div>
          </section>
          <div id="categoryFilters" class="filters"></div>
          <section class="legend-wrap">
            <h3>المفتاح</h3>
            <div id="legend" class="legend"></div>
          </section>
          <section class="stats">
            <p>عدد النقاط الظاهرة: <strong id="visibleCount">0</strong></p>
            <p>إجمالي النقاط: <strong id="totalCount">0</strong></p>
            <p>أقرب موقع: <strong id="nearestName">-</strong></p>
            <p>المسافة: <strong id="nearestDistance">-</strong></p>
          </section>

          <section class="panel-section dashboard">
            <h3>لوحة التحليلات</h3>
            <canvas id="pieChart" height="180"></canvas>
            <canvas id="barChart" height="180"></canvas>
          </section>

          <section class="panel-section geojson-tools">
            <h3>GeoJSON</h3>
            <div class="geojson-actions">
              <button id="importGeoJsonBtn" type="button" class="search-btn">استيراد GeoJSON</button>
              <button id="exportGeoJsonBtn" type="button" class="search-btn secondary">تصدير البيانات</button>
            </div>
            <input id="geoJsonInput" type="file" accept=".json,.geojson,application/geo+json" hidden />
          </section>
        </div>
      </aside>

      <div class="floating-controls" aria-label="أزرار التحكم">
        <button id="zoomInBtn" class="round-btn" title="تكبير">+</button>
        <button id="zoomOutBtn" class="round-btn" title="تصغير">−</button>
        <button id="basemapBtn" class="round-btn" title="تبديل الخريطة">🗺️</button>
        <button id="themeBtn" class="round-btn" title="الوضع الداكن/الفاتح">🌙</button>
        <button id="resetBtn" class="round-btn" title="الرجوع إلى نطاق قنا">🔄</button>
        <button id="locateBtn" class="round-btn" title="موقعي">📍</button>
        <button id="measureBtn" class="round-btn" title="قياس المسافة">📏</button>
        <button id="routingBtn" class="round-btn" title="وضع التوجيه">🧭</button>
        <button id="nearestBtn" class="round-btn" title="أقرب موقع">🧭</button>
      </div>

      <section id="routingPanel" class="routing-panel" aria-label="لوحة التوجيه">
        <div class="routing-header">
          <strong>لوحة التوجيه</strong>
          <button id="clearRouteBtn" type="button" class="routing-clear-btn">مسح</button>
        </div>
        <p class="routing-status">الحالة: <span id="routingStatus">متوقف</span></p>
        <div class="routing-metrics">
          <div class="routing-metric-card">
            <span class="metric-icon">📏</span>
            <span class="metric-label">المسافة</span>
            <strong id="routingDistance">-</strong>
          </div>
          <div class="routing-metric-card">
            <span class="metric-icon">⏱️</span>
            <span class="metric-label">الزمن</span>
            <strong id="routingDuration">-</strong>
          </div>
        </div>
      </section>

      <div id="sidePanel" class="side-panel hidden" aria-hidden="true">
        <div class="panel-header">
          <button id="closePanelBtn" class="panel-close-btn close-btn" type="button" aria-label="إغلاق">&times;</button>
          <div id="panelGallery" class="panel-gallery">
            <div id="panelGalleryTrack" class="panel-gallery-track"></div>
            <button id="panelPrevImageBtn" class="panel-gallery-nav prev" type="button" aria-label="الصورة السابقة">‹</button>
            <button id="panelNextImageBtn" class="panel-gallery-nav next" type="button" aria-label="الصورة التالية">›</button>
            <div id="panelGalleryDots" class="panel-gallery-dots"></div>
          </div>
        </div>
        <div class="panel-body">
          <h2 id="panelTitle"></h2>
          <p id="panelLocation"></p>
          <button id="panelRouteBtn" type="button" class="panel-route-btn">اذهب إلى الموقع</button>
          <div class="panel-tabs" role="tablist" aria-label="تفاصيل الموقع">
            <button id="panelOverviewTab" class="panel-tab active" type="button" role="tab" aria-selected="true">Overview</button>
            <button id="panelDetailsTab" class="panel-tab" type="button" role="tab" aria-selected="false">Details</button>
          </div>
          <div id="panelOverview" class="panel-tab-content active"></div>
          <div id="panelDetails" class="panel-tab-content"></div>
        </div>
      </div>

      <div id="loadingOverlay" class="loading-overlay visible" role="status" aria-live="polite">
        <div class="spinner"></div>
        <p>جاري تحميل بيانات التراث...</p>
      </div>

      <div id="toastContainer" class="toast-container" aria-live="assertive"></div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
